apis:
  - aid: rethinkdb:reql
    name: RethinkDB ReQL Driver API
    description: >-
      ReQL (RethinkDB Query Language) is the expressive query language
      exposed by RethinkDB through official client drivers. Drivers
      communicate with the RethinkDB server using a native JSON protocol
      over TCP (default port 28015) rather than HTTP. ReQL supports
      filtering, joins, aggregations, change feeds, and external HTTP
      access via the r.http command.
    humanURL: https://rethinkdb.com/api
    baseURL: tcp://<your-rethinkdb-host>:28015
    tags:
      - ReQL
      - Drivers
      - Change Feeds
      - JSON Protocol
