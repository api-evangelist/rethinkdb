aid: rethinkdb
name: RethinkDB
description: >-
  RethinkDB is an open source, distributed document-oriented NoSQL database
  designed for real-time applications, with push-based change feeds, native
  JSON storage, and an expressive query language called ReQL. Applications
  interact with RethinkDB through official client drivers (JavaScript,
  Python, Java, Ruby) that speak the native JSON driver protocol over TCP,
  rather than through an HTTP REST API. ReQL also includes an r.http
  command that lets queries pull data from external HTTP APIs directly.
type: Index
