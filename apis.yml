features:
  - name: ReQL Query Language
    description: >-
      Chainable, composable query language with filtering, joins,
      aggregations, geospatial queries, and subqueries.
  - name: Change Feeds
    description: >-
      Subscribe to real-time updates on queries and tables so
      applications can push changes directly to clients.
  - name: Native JSON Storage
    description: >-
      Store and query JSON documents natively with schema flexibility
      and secondary indexes.
  - name: r.http External API Access
    description: >-
      Pull data from external HTTP APIs directly inside ReQL queries
      with pagination, authentication, and streaming via cursors.
  - name: Distributed Architecture
    description: >-
      Built-in sharding, replication, and automatic failover across
      a cluster of RethinkDB nodes.
  - name: Official Drivers
    description: >-
      Official client drivers for JavaScript, Python, Java, and Ruby
      with community drivers for other languages.
solutions:
  - name: Real-Time Applications
    description: >-
      Power dashboards, multiplayer games, collaboration tools, and
      live feeds using change feeds rather than polling.
  - name: Document Store
    description: >-
      Store JSON documents with secondary indexes and flexible
      schemas for content, catalogs, and user data.
  - name: Operational Database
    description: >-
      Use as the operational store for distributed applications
      requiring sharding and replication.
useCases:
  - name: Live Dashboards
    description: >-
      Stream query result changes directly to browser clients via
      change feeds for live operational dashboards.
  - name: Collaborative Editing
    description: >-
      Power multi-user real-time editing experiences where document
      changes propagate immediately to all participants.
  - name: External API Aggregation
    description: >-
      Use r.http inside ReQL queries to fetch and join data from
      external REST APIs without an application-tier proxy.
integrations:
  - name: Node.js
    description: Official rethinkdb-js driver with connection pooling
  - name: Python
    description: Official Python driver for ReQL
  - name: Java
    description: Official Java driver for ReQL
  - name: Ruby
    description: Official Ruby driver for ReQL
